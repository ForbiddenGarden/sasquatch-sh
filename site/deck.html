<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>SSH — Meetup Slides</title>
  <style>
    :root {
      --bg:       #060d06;
      --bg2:      #0d1a0d;
      --border:   #1a331a;
      --green:    #3fb950;
      --green-dim:#2a7a35;
      --text:     #cdd9cd;
      --muted:    #6a8f6a;
      --amber:    #d29922;
      --red:      #e5534b;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    main {
      position: relative;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .prompt {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
    }
    .prompt span { color: var(--green); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--green);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }

    .lock {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--green-dim);
      white-space: pre;
      line-height: 1.3;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--green);
      text-shadow: 0 0 24px rgba(63,185,80,0.3);
      margin-bottom: 8px;
    }

    .sub {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input[type="password"] {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--green);
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 14px;
      letter-spacing: 0.1em;
      outline: none;
      text-align: center;
    }
    input[type="password"]:focus { border-color: var(--green-dim); }
    input[type="password"]::placeholder { color: var(--muted); letter-spacing: 0.02em; }

    button {
      background: rgba(63,185,80,0.08);
      border: 1px solid var(--green-dim);
      border-radius: 4px;
      color: var(--green);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.1em;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: rgba(63,185,80,0.16); border-color: var(--green); }

    .error {
      display: none;
      color: var(--red);
      font-size: 11px;
      letter-spacing: 0.08em;
      margin-top: 6px;
    }
    .error.show { display: block; animation: blink 0.5s step-end 3; }

    .back {
      display: inline-block;
      margin-top: 28px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .back:hover { color: var(--green); }
  </style>
</head>
<body>
<main>
  <div class="prompt">$ <span>./sasquatch.sh/deck</span><span class="cursor"></span></div>

  <pre class="lock" aria-hidden="true">   .-----.
  /  o o  \
  |   ▲    |
  \  ---  /
   '-----'
  [ LOCKED ]</pre>

  <h1>Meetup Slides</h1>
  <p class="sub">Got the access code from tonight? Enter it below.</p>

  <form onsubmit="return checkAccess(event)" autocomplete="off">
    <input id="pw" type="password" placeholder="access code" autofocus>
    <button type="submit">unlock →</button>
  </form>
  <p class="error" id="err">access denied. that's not it.</p>

  <a class="back" href="index.html">&larr; back to sasquatch.sh</a>
</main>

<script>
  // Not real auth — the actual slides are gated server-side. This is
  // just a speed bump that roasts the obvious guesses.
  var traps = [
    "cGFzc3dvcmQ=", "Y2hhbmdlbWU=", "YWRtaW4=", "bGV0bWVpbg==",
    "Z3Vlc3Q=", "MTIzNDU=", "cXdlcnR5", "cm9vdA==", "dG9vcg==",
    "aHVudGVyMg==", "c2FzcXVhdGNo", "YmlnZm9vdA==", "aWxvdmV5b3U=",
    "dHJ1c3RubzE=", "ZGVmYXVsdA=="
  ];

  function checkAccess(e) {
    e.preventDefault();
    var input = document.getElementById('pw').value.trim().toLowerCase();

    if (!input) {
      showError();
      return false;
    }

    var isTrap = traps.some(function (t) { return atob(t) === input; });
    if (isTrap) {
      try { sessionStorage.setItem('ssh_last_guess', input); } catch (e) {}
      window.location.href = 'prank.html';
      return false;
    }

    window.location.href = 'slides.html';
    return false;
  }

  function showError() {
    var el = document.getElementById('err');
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }
</script>
</body>
</html>
